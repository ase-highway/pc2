<!DOCTYPE html>
<html>

<head>
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
  <meta name="format-detection" content="telephone=no" />
  <title></title>

  <link type="text/css" rel="stylesheet" href="../js/jquery-ui/jquery-ui.min.css">
  <link type="text/css" rel="stylesheet" href="../js/swiper/swiper-bundle.min.css" />
  <link type="text/css" rel="stylesheet" href="../css/style.css" />
  <script src="../js/jquery-3.7.1.min.js"></script>
  <script src="../js/swiper/swiper-bundle.min.js"></script>
  <script src="../js/jquery-ui/jquery-ui.min.js"></script>
  <script src="../js/ui.js"></script>

</head>

<body>
  <!-- wrap -->
  <div class="wrap">
    <script>
      $.get("common/header.html", function (data) {
        $(data).prependTo(".wrap");
      });
    </script>
    <!-- container -->
    <div class="container">
      <main class="content">
        


      </main>
      <!-- // content -->
    </div>
    <!-- // container -->

    <script>
      $.get("common/footer.html", function (data) {
        $(data).appendTo(".wrap");
      });
    </script>
  </div>
  <!-- // wrap -->


<!-- layer-popup -->
<section class="layer-popup" id="pop-refund-apply">
  <div class="dim"></div>
  <div class="pop-wrap">
    <div class="popup">
      <button type="button" class="close" onclick="popClose('#pop-refund-apply');"></button>
      <div class="pop-header">
        <h1 class="pop-tit">반품 신청</h1>
      </div>
      <div class="pop-body">
        <h2 class="title-local">반품 정보 기입</h2>
        <table class="table-type1 st2 member-form-table">
          <colgroup>
              <col style="width:180px">
              <col style="width:auto">
          </colgroup>
          <tbody>
            <tr>
              <th>반품 사유 선택<span class="star">*</span></th>
              <td>
                <div class="input-wrap">
                  <label class="inp-chk">
                    <input type="radio" name="refund-reason" checked><span class="ic"></span>
                    <span class="t">배송 지연</span>
                  </label>
                  <label class="inp-chk">
                    <input type="radio" name="refund-reason"><span class="ic"></span>
                    <span class="t">배송누락</span>
                  </label>
                  <label class="inp-chk">
                    <input type="radio" name="refund-reason"><span class="ic"></span>
                    <span class="t">오배송</span>
                  </label>
                  <label class="inp-chk">
                    <input type="radio" name="refund-reason"><span class="ic"></span>
                    <span class="t">상품 파손</span>
                  </label>
                  <label class="inp-chk">
                    <input type="radio" name="refund-reason"><span class="ic"></span>
                    <span class="t">직접입력</span>
                  </label>
                  <input type="text" class="refund-reason-input" disabled placeholder="반품 사유를 적어주세요." style="width:345px;">
                </div>
              </td>
            </tr>
            <tr>
              <th>환불받을 계좌 입력<span class="star">*</span></th>
              <td>
                <div class="row">
                  <select style="width:160px;">
                    <option value="">은행 선택</option>
                  </select>
                  <input type="text" placeholder="환불받으실 계좌번호를 적어주세요." style="width:300px;">
                </div>
              </td>
            </tr>
          </tbody>
        </table>

        <h2 class="title-local">상품 사진 첨부<span class="sub">사진은 최대 2MB 이하의 JPG, PNG, GIF 파일만 첨부 가능합니다.(최대 5장까지)</span></h2>
        <div class="refund-photo-wrap">
          <ul class="refund-photo-list">
            <li class="photo-add">
              <label class="btn-photo-add">
                <input type="file" accept=".jpg,.jpeg,.png,.gif,image/jpeg,image/png,image/gif" class="real" multiple>
                <span class="ic-plus" aria-hidden="true"></span>
                <span class="txt">사진 추가하기</span>
              </label>
            </li>
          </ul>
          <div class="refund-confirm-check">
            <label class="inp-chk">
              <input type="checkbox" name="refund-confirm">
              <span class="ic"></span>
              <span class="t">반품 정보를 모두 확인했습니다.</span>
            </label>
          </div>
        </div>

      </div>
      <div class="pop-footer">
        <div class="btn-wrap">
          <button type="button" class="btn-type3 st2" onclick="popClose('#pop-refund-apply');">취소</button>
          <button type="button" class="btn-type3 st1" onclick="popClose('#pop-refund-apply');">반품 하기</button>
        </div>
      </div>
    </div>
  </div>
</section>
<!-- // layer-popup -->

<script>
  popOpen('#pop-refund-apply');

  $('[name="refund-reason"]').on('change', function () {
    var isCustom = $(this).closest('.inp-chk').find('.t').text() === '직접입력';
    $('.refund-reason-input').prop('disabled', !isCustom).val('');
  });

  (function () {
    var $popup = $('#pop-refund-apply');
    var $list = $popup.find('.refund-photo-list');
    var $fileInput = $popup.find('.btn-photo-add .real');
    var maxCount = 5;
    var maxSize = 2 * 1024 * 1024;
    var acceptTypes = ['image/jpeg', 'image/png', 'image/gif'];

    $fileInput.on('change', function () {
      var files = Array.prototype.slice.call(this.files || []);
      this.value = '';

      files.forEach(function (file) {
        if ($list.find('.photo-item').length >= maxCount) {
          return;
        }
        if (acceptTypes.indexOf(file.type) === -1) {
          alert('JPG, PNG, GIF 파일만 첨부 가능합니다.');
          return;
        }
        if (file.size > maxSize) {
          alert('2MB 이하의 파일만 첨부 가능합니다.');
          return;
        }

        var url = URL.createObjectURL(file);
        var $item = $(
          '<li class="photo-item">' +
            '<div class="thumb"><img src="' + url + '" alt=""></div>' +
            '<button type="button" class="btn-photo-del"></button>' +
          '</li>'
        );

        $item.insertAfter($list.find('.photo-add'));
        updateAddBtn();
      });
    });

    $list.on('click', '.btn-photo-del', function () {
      var $item = $(this).closest('.photo-item');
      var src = $item.find('img').attr('src');

      if (src && src.indexOf('blob:') === 0) {
        URL.revokeObjectURL(src);
      }

      $item.remove();
      updateAddBtn();
    });

    function updateAddBtn() {
      var count = $list.find('.photo-item').length;
      var isFull = count >= maxCount;

      $fileInput.prop('disabled', isFull);
      $list.find('.photo-add').toggleClass('is-disabled', isFull);
    }
  })();
</script>

</body>
</html>
